# Orchestra CI — the merge gate (Sprint 0, Task 10).
# Installs with pnpm, then runs typecheck + lint + vitest on a Node 22 + 24 matrix.
# Required to pass before the Producer merges a PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per ref; cancel superseded runs to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Install pnpm first; version is read from the `packageManager` field in
      # package.json so it stays in lockstep with local dev.
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # --frozen-lockfile fails if the lockfile is out of date (reproducible installs).
      # Build scripts are governed by pnpm-workspace.yaml (ignoredBuiltDependencies),
      # so install runs zero third-party postinstall scripts (supply-chain hygiene).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: React Doctor
        run: pnpm doctor:score

      - name: Build
        run: pnpm build
