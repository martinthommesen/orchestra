name: React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - id: react-doctor
        uses: millionco/react-doctor@v2
        with:
          blocking: warning
          scope: full
          version: "0.5.8"

      - name: Require 100/100 score
        env:
          REACT_DOCTOR_SCORE: ${{ steps.react-doctor.outputs.score }}
        run: |
          if [ "$REACT_DOCTOR_SCORE" != "100" ]; then
            echo "React Doctor score must be 100/100; got '${REACT_DOCTOR_SCORE:-unavailable}'."
            exit 1
          fi
