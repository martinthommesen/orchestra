# Orchestra is a pnpm-workspace monorepo. v1 keeps a single root package (lean
# package set per docs/brainstorm/05-summary.md decision #9). Additional packages
# (e.g. a future Linear adapter or Ink TUI) drop into packages/* without a rewrite.
packages:
  - "packages/*"

# Supply-chain hardening: installs ignore newly-published package versions until
# they have had five days to be vetted, and reject trust-signal downgrades.
minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  # Exact versions already pinned in the lockfile. Future updates still have to
  # satisfy the release-age policy.
  - "@sentry/core@10.61.0"
  - "@sentry/node-core@10.61.0"
  - "@sentry/node@10.61.0"
  - "@sentry/opentelemetry@10.61.0"
  - "@sentry/server-utils@10.61.0"
  - "@tybys/wasm-util@0.10.3"
  - "@typescript-eslint/types@8.62.0"
  - "@vitejs/plugin-react@6.0.3"
  - browserslist@4.28.4
  - electron-to-chromium@1.5.378
  - import-in-the-middle@3.2.0
  - nanoid@3.3.15
  - node-releases@2.0.50
  - vite@8.1.0
trustPolicy: no-downgrade
trustPolicyExclude:
  # Existing lockfile version used by Vite's file watcher stack. Keep this
  # exception version-pinned so future chokidar changes still face the policy.
  - chokidar@4.0.3
  # React Doctor's eslint-plugin-react-hooks transitively resolves this legacy
  # semver build; pin the exception to avoid weakening future semver installs.
  - semver@6.3.1

allowBuilds:
  "@parcel/watcher": false
  esbuild: false
  msgpackr-extract: false

# Build-script policy (pnpm 11 reads this from pnpm-workspace.yaml, NOT the package.json
# `pnpm` field). pnpm 11.8 requires an explicit true/false decision for every dependency
# that ships an install script; an *undecided* entry makes `pnpm install` exit 1 with
# ERR_PNPM_IGNORED_BUILDS (this bit CI on PR #14). We deny all of them (`false`) — none
# are needed: esbuild runs from its prebuilt @esbuild/<platform> binary (powers
# tsup/tsx/vitest) and the native watcher deps are only exercised by Sprint 1's
# hot-reload. Result: `pnpm install --frozen-lockfile` is deterministic (exit 0) and runs
# zero third-party build scripts (supply-chain hygiene). Flip an entry to `true` (and
# refresh the lockfile) if/when we actually need its native build. NOTE: the older
# `ignoredBuiltDependencies` key is NOT honored by pnpm 11.8 — `allowBuilds` is.

# Don't auto-verify/auto-install deps before every `pnpm <script>` run. CI installs
# explicitly with --frozen-lockfile; this keeps `pnpm dev`/`pnpm test` deterministic.
verifyDepsBeforeRun: false
